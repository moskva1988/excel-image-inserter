name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "Excel Image Inserter" \
            --icon icon.png \
            main.py
      - name: Zip .app
        run: |
          cd dist
          zip -r "Excel-Image-Inserter-macOS.zip" "Excel Image Inserter.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Excel-Image-Inserter-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build .exe
        run: |
          pyinstaller --windowed --name "ExcelImageInserter" --icon icon.png main.py
      - name: Zip Windows build
        run: |
          Compress-Archive -Path dist/ExcelImageInserter -DestinationPath dist/ExcelImageInserter-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/ExcelImageInserter-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Excel-Image-Inserter-macOS.zip
            artifacts/ExcelImageInserter-Windows.zip
