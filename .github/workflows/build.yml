name: Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Create .icns icon
        run: |
          mkdir -p icon.iconset
          pip install Pillow
          python3 -c "
          from PIL import Image
          img = Image.open('icon.png')
          sizes = {
              'icon_16x16.png': 16, 'icon_16x16@2x.png': 32,
              'icon_32x32.png': 32, 'icon_32x32@2x.png': 64,
              'icon_128x128.png': 128, 'icon_128x128@2x.png': 256,
              'icon_256x256.png': 256, 'icon_256x256@2x.png': 512,
              'icon_512x512.png': 512, 'icon_512x512@2x.png': 1024,
          }
          for name, size in sizes.items():
              resized = img.resize((size, size), Image.LANCZOS)
              resized.save(f'icon.iconset/{name}')
          "
          iconutil -c icns icon.iconset
      - name: Build .app
        run: |
          pyinstaller --windowed \
            --name "Excel Image Inserter" \
            --icon icon.icns \
            main.py
      - name: Zip .app
        run: |
          cd dist
          zip -r "Excel-Image-Inserter-macOS.zip" "Excel Image Inserter.app"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: dist/Excel-Image-Inserter-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
      - name: Build .exe
        run: |
          pyinstaller --onefile --windowed --name "ExcelImageInserter" --icon icon.ico main.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/ExcelImageInserter.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Excel-Image-Inserter-macOS.zip
            artifacts/ExcelImageInserter.exe
